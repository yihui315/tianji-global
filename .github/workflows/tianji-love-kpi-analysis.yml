name: TianJi Love KPI Analysis

on:
  workflow_dispatch:
    inputs:
      day:
        description: "Required day number, for example 001."
        required: true
        type: string
      report_date:
        description: "Optional report date in YYYY-MM-DD. Leave blank for current run date."
        required: false
        type: string

# Use write only because this workflow commits generated reports and notes.
# Do not grant actions/write, deployments/write, secrets access, or packages/write.
permissions:
  contents: write

concurrency:
  group: tianji-love-kpi-analysis-${{ github.ref }}-${{ inputs.day }}
  cancel-in-progress: false

jobs:
  kpi-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Prepare output directories
        run: |
          mkdir -p .ai/reports assets/marketing/daily

      - name: Analyze manually entered KPI CSV
        uses: openai/codex-action@v1
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Use .agents/skills/tianji-github-kpi-analysis-skill/SKILL.md.

            Goal: analyze manually entered TianJi Love KPI CSV data.
            Day input: ${{ inputs.day }}
            Report date input: ${{ inputs.report_date }}

            Read only non-secret KPI and marketing files such as:
            - data/love-test-day-${{ inputs.day }}-kpi-entry.csv
            - data/love-test-marketing-kpi.csv

            Allowed outputs:
            - .ai/reports/love-test-growth-report-YYYY-MM-DD.md
            - assets/marketing/daily/day-${{ inputs.day }}-optimization-notes.md
            - .ai/CHANGELOG_AI.md
            - .ai/REVIEW_PACKET.md

            Hard stops:
            - If KPI rows are missing, empty, zero-only, or placeholder-only, do not invent analysis. Report that real KPI values are required.
            - Do not read, print, copy, diff, or infer .env files or secrets.
            - Do not run Stripe, checkout, paid smoke, webhook replay, Supabase mutation, provider live calls, server mutation, or production deploy.
            - Do not modify app source.

      - name: Validate allowed path scope
        run: |
          changed="$(git diff --name-only)"
          if [ -z "$changed" ]; then
            echo "No generated changes."
            exit 0
          fi
          echo "$changed"
          blocked="$(printf '%s\n' "$changed" | grep -Ev '^(\.ai/|assets/marketing/daily/)' || true)"
          if [ -n "$blocked" ]; then
            echo "Blocked unexpected paths:"
            echo "$blocked"
            exit 1
          fi

      - name: Run validation
        run: |
          npm run typecheck
          npm run lint
          git diff --check

      - name: Targeted secret-shape scan
        run: |
          paths=""
          for p in .ai assets/marketing data; do
            if [ -e "$p" ]; then paths="$paths $p"; fi
          done
          if [ -z "$paths" ]; then exit 0; fi
          if grep -RInE 'sk_(live|test)_[A-Za-z0-9]{8,}|rk_live_[A-Za-z0-9]{8,}|whsec_[A-Za-z0-9]{8,}|ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|xox[baprs]-[A-Za-z0-9-]{10,}|AKIA[0-9A-Z]{16}|-----BEGIN (RSA|OPENSSH|PRIVATE) KEY-----' $paths; then
            echo "Secret-shaped value found in generated scope."
            exit 1
          fi

      - name: Commit generated KPI analysis
        run: |
          if git diff --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- .ai assets/marketing/daily
          git diff --cached --check
          git commit -m "chore(marketing): add TianJi Love KPI analysis"
          git push
