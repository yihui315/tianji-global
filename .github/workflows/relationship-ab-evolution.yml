name: relationship-ab-evolution

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  evolve-relationship:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Install dependencies (allow exit 1 from peer dep noise) ───────────
      - name: Install dependencies
        run: npm ci --legacy-peer-deps || true
        continue-on-error: true

      # ── Baseline score ────────────────────────────────────────────────────
      - name: Collect baseline score
        run: |
          npx tsx scripts/calculate-relationship-score.ts
          cp relationship-score.json relationship-score-before.json

      # ── Baseline audits ───────────────────────────────────────────────────
      - name: Baseline audits
        run: |
          npm run audit:routes
          npm run audit:copy
          npm run audit:share
          npm run audit:upgrade

      # ── Codex generates A/B variants ─────────────────────────────────────
      - name: Run Codex A/B experiment
        uses: openai/codex-action@v1
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Read program.md and AGENTS.md before doing anything.

            Run one A/B experiment for the Relationship module.
            Focus on ONE surface: Hero Summary (headline, one-liner, CTA copy).

            Create two variants and WRITE BOTH to disk:
            - experiments/relationship/variant-a.json
            - experiments/relationship/variant-b.json

            Each must include { name, focus, metrics }.
            Variant A = emotional framing ("You feel something real, but...")
            Variant B = functional framing ("This connection has long-term potential, but...")

            Then run: npx tsx scripts/compare-ab-variants.ts

            Then IMMEDIATELY run: npx tsx scripts/decide-keep-or-discard.ts

            The decide script will produce relationship-decision.json.
            If decision === "keep": ALSO run: npx tsx scripts/apply-winning-copy.ts
            to write the winning copy into src/lib/relationship-engine.ts

            Do NOT skip any of these steps.

      # ── Compare A/B ───────────────────────────────────────────────────────
      - name: Compare A/B variants
        run: npx tsx scripts/compare-ab-variants.ts

      # ── Decide keep or discard ────────────────────────────────────────────
      - name: Decide keep or discard
        run: npx tsx scripts/decide-keep-or-discard.ts
        continue-on-error: true

      # ── Apply winning copy to engine ───────────────────────────────────────
      - name: Apply winning copy
        run: npx tsx scripts/apply-winning-copy.ts
        continue-on-error: true

      # ── Current score ─────────────────────────────────────────────────────
      - name: Collect current score
        run: |
          npx tsx scripts/calculate-relationship-score.ts
          cp relationship-score.json relationship-score-after.json

      # ── Generate upgrade report ───────────────────────────────────────────
      - name: Generate upgrade report
        run: npx tsx scripts/generate-upgrade-report.ts

      # ── GATE: report must exist ────────────────────────────────────────────
      - name: Verify report exists
        run: test -f codex-upgrade-report.md || { echo "❌ codex-upgrade-report.md missing"; exit 1; }

      # ── Record to manifest ─────────────────────────────────────────────────
      - name: Record experiment
        run: npx tsx scripts/record-experiment.ts ab-result.json

      # ── Commit + PR ───────────────────────────────────────────────────────
      - name: Commit and create PR
        run: |
          git config user.name "Codex Agent"
          git config user.email "codex@tianji.global"

          # Stage engine + experiment files
          git add src/lib/relationship-engine.ts
          git add experiments/relationship/
          git add experiments/manifest.json
          git add codex-upgrade-report.md

          # Check if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit (experiment was discarded or no copy was applied)"
            exit 0
          fi

          # Commit with report title
          REPORT_TITLE=$(grep "^# Codex" codex-upgrade-report.md | head -1 | sed 's/^# //')
          git commit -m "$REPORT_TITLE"
          git push origin codex/relationship-ab || git push origin codex/relationship-ab --force

          # Create PR
          npx tsx scripts/create-pr.ts || gh pr create \
            --base main \
            --head codex/relationship-ab \
            --title "$REPORT_TITLE" \
            --body-file codex-upgrade-report.md \
            2>/dev/null || echo "PR creation attempted"
