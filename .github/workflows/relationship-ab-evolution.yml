name: relationship-ab-evolution

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  evolve-relationship:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci --legacy-peer-deps

      # ── Baseline score (before experiment) ─────────────────────────────────
      - name: Collect baseline score
        run: |
          npx tsx scripts/calculate-relationship-score.ts
          cp relationship-score.json relationship-score-before.json

      # ── Baseline audits ──────────────────────────────────────────────────────
      - name: Baseline audits
        run: |
          npm run audit:routes
          npm run audit:copy
          npm run audit:share
          npm run audit:upgrade

      # ── A/B Experiment via Codex ─────────────────────────────────────────────
      - name: Run Codex A/B experiment
        uses: openai/codex-action@v1
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Read program.md.

            Run one A/B experiment for the Relationship module.
            Focus on ONE surface: Hero Summary (headline, one-liner, CTA copy).

            Create two variants:
            - Variant A: emotional framing ("You feel something real, but...")
            - Variant B: functional framing ("This connection has long-term potential, but...")

            Write both to:
            - experiments/relationship/variant-a.json
            - experiments/relationship/variant-b.json

            Each variant JSON must include:
            {
              "name": "Variant A — Hero Summary emotional",
              "focus": "hero_summary",
              "metrics": {
                "hasHeroSummary": true,
                "hasPattern": true,
                "hasFiveDimensions": true,
                "hasCurrentWindow": true,
                "hasPracticalGuidance": true,
                "hasPremiumSection": true,
                "shareModes": 3,
                "headlineStrength": 14,
                "patternClarity": 12,
                "emotionalResonance": 13,
                "upgradeStrength": 10
              }
            }

            IMPORTANT: also update the actual source files (relationship-engine.ts)
            with the winning copy AFTER comparison is done. Codex should produce the
            winning copy, not just the variant JSON files.

      # ── Compare A/B variants ────────────────────────────────────────────────
      - name: Compare A/B variants
        run: npx tsx scripts/compare-ab-variants.ts

      # ── Current score (after experiment) ────────────────────────────────────
      - name: Collect current score
        run: |
          npx tsx scripts/calculate-relationship-score.ts
          cp relationship-score.json relationship-score-after.json

      # ── Decide keep or discard ──────────────────────────────────────────────
      - name: Decide keep or discard
        run: npx tsx scripts/decide-keep-or-discard.ts
        continue-on-error: true

      # ── Generate upgrade report (REQUIRED gate) ──────────────────────────────
      - name: Generate upgrade report
        run: npx tsx scripts/generate-upgrade-report.ts

      # ── GATE: codex-upgrade-report.md must exist ─────────────────────────────
      - name: Verify report exists
        run: test -f codex-upgrade-report.md || { echo "❌ codex-upgrade-report.md not generated"; exit 1; }

      # ── Record experiment in manifest ───────────────────────────────────────
      - name: Record experiment
        run: npx tsx scripts/record-experiment.ts ab-result.json

      # ── Commit winning copy to main (skip if discard) ──────────────────────
      - name: Commit winning copy
        if: success() && !contains(needs.*.result, 'skipped')
        run: |
          git config user.name "Codex Agent"
          git config user.email "codex@tianji.global"
          git add src/lib/relationship-engine.ts
          git add experiments/relationship/
          git add experiments/manifest.json
          git add codex-upgrade-report.md
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "$(cat codex-upgrade-report.md | head -5)"

      # ── Create PR ────────────────────────────────────────────────────────────
      - name: Create PR
        if: success()
        uses: peter-evans/create-pull-request@v7
        with:
          branch: codex/relationship-ab
          title: "Codex: Relationship A/B evolution — rel-ab-latest"
          body-path: codex-upgrade-report.md
