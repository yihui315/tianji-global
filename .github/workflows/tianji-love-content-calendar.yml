name: TianJi Love Content Calendar

on:
  workflow_dispatch:

# Scheduled trigger disabled for the first supervised week.
# Previous daily timing was 37 1 * * *.

permissions:
  contents: read

concurrency:
  group: tianji-love-content-calendar-${{ github.ref }}
  cancel-in-progress: false

jobs:
  content-calendar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      MINIMAX_BASE_URL: ${{ secrets.MINIMAX_BASE_URL }}
      MINIMAX_MODEL: ${{ secrets.MINIMAX_MODEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate TianJi Love content calendar draft
        run: npm run tianji:content-calendar

      - name: Upload generated artifact
        uses: actions/upload-artifact@v4
        with:
          name: tianji-love-content-calendar
          path: .ai/generated/tianji-love-content-calendar.md
