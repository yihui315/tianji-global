name: codex-self-evolution

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  evolve:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # 1️⃣ 记录当前分数
      - name: Score BEFORE
        run: |
          npx tsx scripts/calculate-upgrade-score.ts
          cp upgrade-score.json upgrade-score-before.json

      # 2️⃣ Codex 执行实验
      - name: Codex Run
        uses: openai/codex-action@v1
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Read AGENTS.md and program.md.

            Only improve the current experiment focus.

            Make small, high-confidence changes.
            Then run:
            npm run audit:routes
            npm run audit:copy
            npm run audit:share
            npm run audit:upgrade

            If failing, repair once.

            Output codex-upgrade-report.md.

      # 3️⃣ 再算分数
      - name: Score AFTER
        run: |
          npx tsx scripts/calculate-upgrade-score.ts
          cp upgrade-score.json upgrade-score-after.json

      # 4️⃣ 决策（核心）
      - name: Decide keep or discard
        run: npx tsx scripts/decide-keep-or-discard.ts

      # 5️⃣ 只在提升时提PR
      - name: Create PR
        if: success()
        uses: peter-evans/create-pull-request@v7
        with:
          branch: codex/evolution
          title: "Codex Evolution: improved system"
          body-path: codex-upgrade-report.md
