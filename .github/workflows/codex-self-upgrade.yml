name: codex-self-upgrade

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  audit-and-upgrade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install
        run: npm ci

      - name: Generate upgrade plan
        run: npm run upgrade:plan

      - name: Run baseline audits
        run: |
          npm run audit:routes
          npm run audit:copy
          npm run audit:share
          npm run audit:upgrade

      - name: Run Codex upgrade
        uses: openai/codex-action@v1
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Read AGENTS.md, docs/upgrade-contract.md, docs/release-gates.md, and docs/self-check-rubric.json.
            Then:
            1. Identify the top 1-2 repository gaps.
            2. Implement only those changes.
            3. Run:
               npm run typecheck || true
               npm run lint || true
               npm run test || true
               npm run build || true
               npm run audit:routes
               npm run audit:copy
               npm run audit:share
               npm run audit:upgrade
            4. If checks fail, repair once.
            5. Create a concise upgrade summary in codex-upgrade-report.md
          codex_args: >
            exec -c model_reasoning_effort="high"

      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: codex/self-upgrade
          title: "Codex: self-upgrade pass"
          commit-message: "chore: codex self-upgrade pass"
          body-path: codex-upgrade-report.md
