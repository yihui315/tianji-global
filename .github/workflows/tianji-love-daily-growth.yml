name: TianJi Love Daily Growth

on:
  workflow_dispatch:
    inputs:
      day:
        description: "Optional day number, for example 002."
        required: false
        type: string

# Scheduled trigger disabled for the first supervised week.
# Previous daily timing was 17 1 * * *.

permissions:
  contents: read

concurrency:
  group: tianji-love-daily-growth-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily-growth:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      MINIMAX_BASE_URL: ${{ secrets.MINIMAX_BASE_URL }}
      MINIMAX_MODEL: ${{ secrets.MINIMAX_MODEL }}
      TIANJI_LOVE_DAY: ${{ inputs.day }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate TianJi Love daily growth draft
        run: npm run tianji:daily-growth

      - name: Upload generated artifact
        uses: actions/upload-artifact@v4
        with:
          name: tianji-love-daily-growth
          path: .ai/generated/tianji-love-daily-growth.md
