name: self-audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    concurrency:
      group: self-audit-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Run checks
        run: |
          npm run typecheck
          npm run lint
          npm run test -- --runInBand || npm run test
          npm run build
          npm run audit:routes
          npm run audit:copy
          npm run audit:share
          npm run audit:upgrade
